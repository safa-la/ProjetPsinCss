<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Support Informatique</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Support Informatique</h1>
        <p>Demande d'assistance</p>
        <div class="badge-ligne">Équipe disponible</div>
    </header>

    <main>
        <section>
            <h2>Problèmes fréquents</h2>
            <ul>
                <li>Ordinateur lent</li>
                <li>Connexion Internet</li>
                <li>Mot de passe oublié</li>
            </ul>
        </section>

        <section class="formulaire-section">
            <h2>Formulaire de contact</h2>
            <form>
                <label>Nom :</label>
                <input type="text" placeholder="Votre nom">
                <label>Email :</label>
                <input type="email" placeholder="Votre email">
                <label>Problème :</label>
                <select>
                    <option>Ordinateur lent</option>
                    <option>Internet</option>
                    <option>Mot de passe</option>
                </select>
                <label>Message :</label>
                <textarea placeholder="Décrivez votre problème"></textarea>
                <button type="submit">Envoyer</button>
            </form>
        </section>
    </main>

    <footer>
        <p>© <span>Service informatique</span> — Tous droits réservés</p>
    </footer>

</body>
</html>
